# Autograder por PR (J.A.R.V.I.S.) — comenta a NOTA MÍNIMA (auto-verificável) a cada commit.
#
# ⚠️ SEGURANÇA (two-checkout): roda em fork sem aprovação E precisa comentar →
#   - trigger pull_request_target (NUNCA pull_request: fork não dispara nem posta)
#   - checkout BASE (main) = grader CONFIÁVEL do prof, na raiz
#   - checkout HEAD (head.sha) ISOLADO em _pr/ = a entrega NÃO-confiável, que o validator só LÊ
#   - jamais npm install / executar a entrega. O validator não roda código do aluno.
#
# Distribuição: na sincronização pros repos públicos, este arquivo vai pra RAIZ do repo
# (.github/workflows/grade.yml) e o capstone fica em capstone/.
name: grade

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      # (a) BASE confiável (grader do prof)
      - name: Checkout base (grader confiável)
        uses: actions/checkout@v4

      # (b) HEAD não-confiável, isolado — só será LIDO
      - name: Checkout entrega (isolada em _pr/)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: _pr
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolver caminho da entrega
        id: entrega
        run: |
          if [ -d "$GITHUB_WORKSPACE/_pr/capstone/server" ]; then
            echo "path=$GITHUB_WORKSPACE/_pr/capstone" >> "$GITHUB_OUTPUT"
          else
            echo "path=$GITHUB_WORKSPACE/_pr" >> "$GITHUB_OUTPUT"
          fi

      - name: Instalar grader (confiável)
        working-directory: capstone/grader
        run: npm ci || npm install

      - name: Rodar validator (lê a entrega, não executa)
        id: run
        working-directory: capstone/grader
        continue-on-error: true
        run: |
          npx tsx validator.ts \
            --branch "${{ github.event.pull_request.head.ref }}" \
            --entrega "${{ steps.entrega.outputs.path }}" \
            --out "$GITHUB_WORKSPACE/grade.json"

      - name: Montar comentário
        id: body
        run: |
          node <<'JS' > "$GITHUB_WORKSPACE/comment.md"
          const fs = require('fs');
          const p = process.env.GITHUB_WORKSPACE + '/grade.json';
          if (!fs.existsSync(p)) {
            console.log('🤖 **J.A.R.V.I.S.** — não consegui avaliar este PR.\n\n' +
              'Sua branch segue o padrão `task/<id-da-task>-<seu-login>`? ' +
              'O `<id>` precisa existir em `tasks-*/TASKS.md`.');
            process.exit(0);
          }
          const g = JSON.parse(fs.readFileSync(p, 'utf8'));
          const out = [
            '🤖 **J.A.R.V.I.S.** — nota mínima (auto-verificável)',
            '',
            g.breakdown,
            '',
            `**Piso automático: ${g.autoScore}/${g.maxAutoScore}** · total da rubrica: ${g.maxTotalScore} pts`,
            '',
            '> 📝 = critério de avaliação **manual** no Canvas (não entra neste número).',
            '> Este é um **piso**: a nota final é lançada no Canvas e nunca é menor que isto.',
          ].join('\n');
          console.log(out);
          JS

      - name: Comentar no PR (cria/atualiza)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.GITHUB_WORKSPACE + '/comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = 'J.A.R.V.I.S.';
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const mine = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            if (mine) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: mine.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # grade.json completo (tem privateBreakdown/privateNote) — artifact privado, só prof
      - name: Subir grade.json (privado)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grade-${{ github.event.pull_request.number }}
          path: grade.json
          if-no-files-found: ignore
