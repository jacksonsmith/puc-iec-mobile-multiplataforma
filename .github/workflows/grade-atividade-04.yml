name: A4 — PWA (autograder)

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'exercicios/04-pwa-tmdb/**'

permissions:
  pull-requests: write
  contents: read

jobs:
  grade:
    name: Grade A4
    runs-on: ubuntu-latest
    steps:
      # 1. checkout BASE (grader confiável do prof)
      - uses: actions/checkout@v4
        with:
          ref: main

      # 2. checkout PR do aluno em pasta isolada (não-confiável)
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: _pr

      # 3. instalar deps do pratica (do PR do aluno)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: _pr/exercicios/04-pwa-tmdb/pratica/package-lock.json

      - name: Install deps
        working-directory: _pr/exercicios/04-pwa-tmdb/pratica
        run: npm ci

      # 4. rodar testes unitários (entrega do aluno)
      - name: Unit tests
        id: unit
        working-directory: _pr/exercicios/04-pwa-tmdb/pratica
        run: npm test -- --reporter=json --outputFile=unit-results.json
        continue-on-error: true

      # 5. rodar validator estrutural (grader do prof, lê entrega em _pr/)
      - name: Structural validator
        id: validator
        working-directory: exercicios/04-pwa-tmdb/grader
        run: |
          npm ci
          npx ts-node validator.ts --entrega ../../../_pr/exercicios/04-pwa-tmdb/pratica
        continue-on-error: true

      # 6. postar comentário no PR
      - name: Post grade comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let unitSummary = '⚠️ testes não rodaram';
            let structSummary = '⚠️ validator não rodou';
            let scoreLine = '';

            try {
              const u = JSON.parse(fs.readFileSync(
                '_pr/exercicios/04-pwa-tmdb/pratica/unit-results.json', 'utf8'));
              const passed = u.numPassedTests ?? 0;
              const failed = u.numFailedTests ?? 0;
              const todos  = u.numTodoTests ?? 0;
              const total  = passed + failed + todos;
              unitSummary = `${passed}/${total} passando · ${todos} it.todo pendente(s)`;
            } catch {}

            try {
              const g = JSON.parse(fs.readFileSync(
                'exercicios/04-pwa-tmdb/grader/grade.json', 'utf8'));
              const lines = g.results
                .map(r => `${r.pass ? '✅' : '❌'} **${r.label}** (${r.pass ? r.weight : 0}/${r.weight}): ${r.note}`)
                .join('\n');
              structSummary = '\n' + lines;
              scoreLine = `\n**Nota mínima automática: ${g.autoScore}/${g.maxScore}**\n`;
            } catch {}

            const body = [
              '## 🤖 A4 — PWA Autograder',
              '',
              `**Testes unitários:** ${unitSummary}`,
              '',
              '**Checklist estrutural:**',
              structSummary,
              scoreLine,
              '📝 Qualidade de código entra na nota final lançada no Canvas.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      # 7. upload artifacts (privado — só o prof vê)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grade-results
          path: |
            exercicios/04-pwa-tmdb/grader/grade.json
            _pr/exercicios/04-pwa-tmdb/pratica/unit-results.json
