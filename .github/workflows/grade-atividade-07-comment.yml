name: Grade A7 comment — posta nota mínima

# Etapa 2/2 do autograder seguro: roda em contexto CONFIÁVEL (base), com token
# de escrita, mas SÓ LÊ o artifact (vitest-results.json + meta) produzido pela
# etapa 1. Nunca executa código do aluno. Roda o validator e comenta no PR.
on:
  workflow_run:
    workflows: ['Grade A7 run — roda os testes do fork (sem token)']
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  actions: read

jobs:
  comment:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1️⃣ Checkout base/main — grader CONFIÁVEL do prof
      - uses: actions/checkout@v4

      # 2️⃣ Baixar artifact da etapa 1
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: a7-run
          path: out
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 3️⃣ Extrair meta do artifact
      - id: meta
        run: |
          if [ ! -f out/meta.json ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          node -e '
            const m = require("./out/meta.json"), fs = require("fs");
            fs.appendFileSync(process.env.GITHUB_OUTPUT,
              `pr=${m.pr}\nlogin=${m.login}\nsha=${m.sha}\nskip=${m.skip}\n`);
          '

      - if: steps.meta.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: npm ci no grader
        if: steps.meta.outputs.skip != 'true'
        working-directory: ./grader
        run: npm ci || npm install

      # 4️⃣ Rodar validator A7 (só lê o vitest-results.json — nunca executa entrega)
      - name: Rodar validator A7
        if: steps.meta.outputs.skip != 'true'
        working-directory: ./grader
        run: |
          npx tsx lib/validators/pwa-tmdb.ts \
            --results "../out/vitest-results.json" \
            --output /tmp/grade.json \
            --student-login "${{ steps.meta.outputs.login }}" \
            --commit-sha "${{ steps.meta.outputs.sha }}" || true

      # 5️⃣ Upload grade.json como artifact privado (tem privateBreakdown)
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grade-a7-${{ steps.meta.outputs.login }}
          path: /tmp/grade.json
          retention-days: 30
          if-no-files-found: warn

      # 6️⃣ Comentar no PR (nota mínima + breakdown)
      - name: Comentar no PR
        if: steps.meta.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const pr = Number('${{ steps.meta.outputs.pr }}');
            const head = [
              `## 🤖 J.A.R.V.I.S. — *autograder do Prof. Jackson*`,
              ``,
              `> *Just A Rather Very Intelligent System* — bot que executa as regras de avaliação nos PRs.`,
              ``,
              `**Atividade 7 — PWA TMDB (offline-first com IndexedDB)**`,
              ``,
            ].join('\n');

            if (!fs.existsSync('/tmp/grade.json')) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: pr,
                body: head +
                  `❌ A suíte não executou (erro de install/config). ` +
                  `Rode \`npm install && npm test\` dentro de \`exercicios/07-pwa-tmdb/pratica/\` ` +
                  `e confirme que o ambiente está ok antes de fazer commit.`,
              });
              return;
            }

            const g = JSON.parse(fs.readFileSync('/tmp/grade.json', 'utf8'));
            const fmt = n => String(Number(n).toFixed(1)).replace('.', ',');
            const body = [
              head,
              `### ${g.pass ? '✅' : '⚠️'} Nota MÍNIMA automática: **${fmt(g.score)} / ${g.total}**`,
              `É um **piso** — testes automatizados que passaram de verdade.`,
              `A nota final é lançada **no Canvas** e parte daqui (**só sobe** com revisão manual).`,
              ``,
              `#### Detalhes`,
              g.publicBreakdown,
              ``,
              g.pass
                ? `✅ Mínimo atingido (${fmt(g.score)}/${g.total}). ` +
                  `Algum ❌? Faça um commit e o bot reavalia.`
                : `⚠️ Abaixo do mínimo — veja os ❌ acima, rode \`npm test\` local e faça commit.`,
              ``,
              `**Como testar offline (demo em aula):**`,
              `\`npm run dev\` → carregue filmes → clique 📵 Offline → reload → filmes aparecem do cache.`,
              ``,
              `_Dúvidas? **Teams da turma** ou jackson.96@gmail.com._`,
            ].join('\n');

            await github.rest.issues.createComment({
              ...context.repo, issue_number: pr, body,
            });
