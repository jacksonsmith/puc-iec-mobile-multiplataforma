name: Grade — Atividade 3 (Flutter UI + Estado)

# Roda em PR de FORK a cada commit (pull_request_target → comenta sem aprovação manual).
# ESTRUTURAL: o validator só LÊ os .dart da entrega — nunca executa código do fork.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'exercicios/03-flutter-ui-estado/**'

permissions:
  pull-requests: write
  contents: read

env:
  EXERCISE: exercicios/03-flutter-ui-estado
  VALIDATOR: flutter-ui-estado.ts
  ATIVIDADE: 'Atividade 3 — App Flutter: UI + Estado + Testes'

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 1) Base (main): o grader CONFIÁVEL do prof. NUNCA rodamos código do fork.
      - uses: actions/checkout@v4

      # 2) HEAD do PR isolado em _pr/: a entrega do aluno (só LIDA estaticamente).
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: _pr

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - working-directory: ./grader
        run: npm ci || npm install

      # Descobre a pasta da entrega a partir dos arquivos mudados (acha o projeto
      # Flutter pelo pubspec.yaml; funciona em aluno-<login>/, edição in-place, etc.)
      - id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const path = require('node:path');
            const EX = process.env.EXERCISE;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.payload.pull_request.number, per_page: 100,
            });
            const changed = files.map(f => f.filename)
              .filter(f => f.startsWith(EX + '/'));
            const dirOf = f => path.posix.dirname(f);
            let entrega =
              // 1) pasta do pubspec.yaml mudado (raiz do projeto Flutter)
              changed.filter(f => f.endsWith('/pubspec.yaml')).map(dirOf)[0];
            if (!entrega) {
              // 2) subpasta de 1º nível sob o exercício com mais arquivos mudados
              const counts = {};
              for (const f of changed) {
                const rest = f.slice(EX.length + 1);
                if (rest.includes('/')) {
                  const top = rest.split('/')[0];
                  counts[top] = (counts[top] || 0) + 1;
                }
              }
              const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0];
              if (top) entrega = `${EX}/${top}`;
            }
            // 3) fallback: edição in-place na pasta pratica/ do exercício
            if (!entrega) entrega = `${EX}/pratica`;
            core.setOutput('entrega', entrega);
            core.setOutput('found', changed.length ? 'yes' : 'no');
            core.info(`Entrega descoberta: ${entrega} (${changed.length} arquivos mudados)`);

      - name: Rodar validator
        working-directory: ./grader
        run: |
          npx tsx "lib/validators/${VALIDATOR}" \
            --entrega "../_pr/${{ steps.discover.outputs.entrega }}" \
            --output /tmp/grade.json \
            --student-login "${{ github.event.pull_request.user.login }}" \
            --commit-sha "${{ github.event.pull_request.head.sha }}" || true

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grade-${{ github.event.pull_request.user.login }}
          path: /tmp/grade.json
          retention-days: 30
          if-no-files-found: warn

      - name: Comentar no PR (nota mínima + porquê)
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const ATIV = process.env.ATIVIDADE;
            const head = `## 🤖 J.A.R.V.I.S. — *autograder do Prof. Jackson*\n\n` +
              `> *Just A Rather Very Intelligent System* — roda as regras de avaliação nos PRs.\n\n` +
              `**${ATIV}**\n\n`;
            if (!fs.existsSync('/tmp/grade.json')) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number,
                body: head + `❌ Não consegui avaliar. Confira se o projeto Flutter (com \`pubspec.yaml\`) está dentro de \`${process.env.EXERCISE}/\`.`,
              });
              return;
            }
            const g = JSON.parse(fs.readFileSync('/tmp/grade.json', 'utf8'));
            const fmt = (n) => String(n).replace('.', ',');
            const manual = g.manualTotal ?? 0;
            const body = head +
              `### ⚠️ Nota MÍNIMA automática: **${fmt(g.score)} / ${g.total}**\n` +
              `É um **piso**: a nota final (lançada no **Canvas**) parte daqui e **só sobe** com a revisão.\n\n` +
              `${g.publicBreakdown}\n\n` +
              (manual > 0
                ? `📝 Itens _avaliação manual_ valem **+${manual} pts** (compilar/rodar + README, conferidos no Canvas).\n\n`
                : ``) +
              (g.pass
                ? `✅ Critérios automáticos mínimos atendidos.\n\n`
                : `⚠️ Abaixo do mínimo automático — revise os ❌ acima e faça um novo commit (eu re-avalio).\n\n`) +
              `💡 Rode \`flutter test\` localmente — \`checklist_test.dart\` confirma que terminou tudo.\n` +
              `_Dúvidas? **Teams da turma** ou jackson.96@gmail.com._`;
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number, body,
            });

      - name: Status check (piso automático)
        if: always()
        run: |
          if [ -f /tmp/grade.json ]; then
            PASS=$(node -e "process.stdout.write(String(require('/tmp/grade.json').pass))")
            [ "$PASS" = "true" ] && exit 0 || exit 1
          else
            exit 1
          fi
