name: A4 — PWA Tests

on:
  pull_request:
    paths:
      - 'exercicios/04-pwa-tmdb/pratica/**'

permissions:
  pull-requests: write

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: exercicios/04-pwa-tmdb/pratica
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: exercicios/04-pwa-tmdb/pratica/package-lock.json }
      - run: npm ci
      - run: npm test -- --reporter=json --outputFile=unit-results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-results
          path: exercicios/04-pwa-tmdb/pratica/unit-results.json

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    defaults:
      run:
        working-directory: exercicios/04-pwa-tmdb/pratica
    env:
      VITE_TMDB_TOKEN: ${{ secrets.VITE_TMDB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: exercicios/04-pwa-tmdb/pratica/package-lock.json }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: exercicios/04-pwa-tmdb/pratica/playwright-results.json
