name: Atividade 3 — Flutter UI + Estado (Arquitetura)

on:
  push:                 # qualquer branch do próprio repo
  pull_request_target:  # PRs de forks — roda sem aprovação manual

# Gate da Atividade 3: `flutter test` precisa passar (Ex1 + Ex2).
# Roda do diretório do projeto (onde está o pubspec.yaml).
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # pull_request_target roda no contexto da base — checkout explícito do HEAD do PR
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.7'
          channel: stable

      - run: flutter pub get
      - run: flutter analyze
      - name: Rodar testes (Ex1 + Ex2)
        run: flutter test --reporter expanded
