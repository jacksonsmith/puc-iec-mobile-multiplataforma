# Feature 2 — navegação lista → detalhe
appId: com.puciec.pokedexkmp
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "item-list-screen"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "item-card-25"
    direction: DOWN
- tapOn:
    id: "item-card-25"
- assertVisible:
    id: "detail-screen"
- assertVisible:
    id: "detail-title"
- assertVisible: "Pikachu"
